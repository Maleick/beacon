<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Subtle Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
    </pattern>

    <!-- Dot Pattern -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#334155" opacity="0.3"/>
    </pattern>

    <!-- Glow Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Badge Gradient -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Conveyor Belt Gradient -->
    <linearGradient id="conveyorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Package Glow -->
    <filter id="pkgGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="460" fill="url(#bgGrad)"/>
  <rect width="1200" height="460" fill="url(#grid)"/>
  <rect width="1200" height="460" fill="url(#dots)"/>

  <!-- Circuit Lines Background -->
  <g opacity="0.15" stroke="#475569" stroke-width="1" fill="none">
    <path d="M 0 200 L 200 200 L 250 150 L 400 150"/>
    <path d="M 1200 280 L 1000 280 L 950 330 L 800 330"/>
    <path d="M 100 0 L 100 100 L 150 150 L 150 460"/>
    <path d="M 1100 0 L 1100 100 L 1050 150 L 1050 460"/>
    <circle cx="200" cy="200" r="3" fill="#fbbf24" stroke="none"/>
    <circle cx="400" cy="150" r="3" fill="#fbbf24" stroke="none"/>
    <circle cx="1000" cy="280" r="3" fill="#f97316" stroke="none"/>
    <circle cx="800" cy="330" r="3" fill="#f97316" stroke="none"/>
    <circle cx="100" cy="100" r="3" fill="#fbbf24" stroke="none"/>
    <circle cx="1100" cy="100" r="3" fill="#f97316" stroke="none"/>
  </g>

  <!-- Conveyor Belt Flow -->
  <g transform="translate(0, 360)">
    <!-- Belt Base -->
    <rect x="150" y="0" width="900" height="40" rx="4" fill="url(#conveyorGrad)" stroke="#334155" stroke-width="1"/>
    <!-- Belt Rollers -->
    <circle cx="180" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="240" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="300" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="360" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="420" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="480" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="540" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="600" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="660" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="720" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="780" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="840" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="900" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="960" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="1020" cy="20" r="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <!-- Belt Motion Lines -->
    <line x1="150" y1="8" x2="1050" y2="8" stroke="#fbbf24" stroke-width="1" opacity="0.3" stroke-dasharray="8 12"/>
    <line x1="150" y1="32" x2="1050" y2="32" stroke="#f97316" stroke-width="1" opacity="0.2" stroke-dasharray="8 12"/>
  </g>

  <!-- Flow Arrow -->
  <g transform="translate(600, 340)" filter="url(#softGlow)">
    <path d="M -80 0 L 60 0 L 40 -15 M 60 0 L 40 15" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <text x="0" y="-25" text-anchor="middle" fill="#fbbf24" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" letter-spacing="2">ISSUES → PRS</text>
  </g>

  <!-- Packages on Conveyor -->
  <g transform="translate(280, 325)">
    <rect x="0" y="0" width="36" height="28" rx="3" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" filter="url(#pkgGlow)"/>
    <rect x="8" y="8" width="20" height="3" rx="1" fill="#fbbf24" opacity="0.6"/>
    <rect x="14" y="5" width="8" height="10" rx="1" fill="#fbbf24" opacity="0.4"/>
    <text x="18" y="42" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500">#142</text>
  </g>

  <g transform="translate(420, 320)">
    <rect x="0" y="0" width="40" height="32" rx="3" fill="#1e293b" stroke="#f97316" stroke-width="1.5" filter="url(#pkgGlow)"/>
    <rect x="10" y="10" width="20" height="3" rx="1" fill="#f97316" opacity="0.6"/>
    <rect x="16" y="6" width="8" height="12" rx="1" fill="#f97316" opacity="0.4"/>
    <text x="20" y="46" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500">#143</text>
  </g>

  <g transform="translate(580, 328)">
    <rect x="0" y="0" width="34" height="26" rx="3" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" filter="url(#pkgGlow)"/>
    <rect x="7" y="7" width="20" height="3" rx="1" fill="#fbbf24" opacity="0.6"/>
    <rect x="13" y="4" width="8" height="10" rx="1" fill="#fbbf24" opacity="0.4"/>
    <text x="17" y="40" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500">#144</text>
  </g>

  <g transform="translate(740, 322)">
    <rect x="0" y="0" width="38" height="30" rx="3" fill="#1e293b" stroke="#f97316" stroke-width="1.5" filter="url(#pkgGlow)"/>
    <rect x="9" y="9" width="20" height="3" rx="1" fill="#f97316" opacity="0.6"/>
    <rect x="15" y="6" width="8" height="11" rx="1" fill="#f97316" opacity="0.4"/>
    <text x="19" y="44" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500">#145</text>
  </g>

  <g transform="translate(880, 326)">
    <rect x="0" y="0" width="36" height="28" rx="3" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" filter="url(#pkgGlow)"/>
    <rect x="8" y="8" width="20" height="3" rx="1" fill="#fbbf24" opacity="0.6"/>
    <rect x="14" y="5" width="8" height="10" rx="1" fill="#fbbf24" opacity="0.4"/>
    <text x="18" y="42" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500">#146</text>
  </g>

  <!-- Postman Character -->
  <g transform="translate(520, 140)">
    <!-- Shadow -->
    <ellipse cx="80" cy="185" rx="50" ry="8" fill="#000" opacity="0.3"/>

    <!-- Legs -->
    <rect x="55" y="130" width="16" height="50" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="89" y="130" width="16" height="50" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <!-- Shoes -->
    <path d="M 50 175 L 75 175 L 75 182 Q 75 185 72 185 L 53 185 Q 50 185 50 182 Z" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <path d="M 84 175 L 109 175 L 109 182 Q 109 185 106 185 L 87 185 Q 84 185 84 182 Z" fill="#0f172a" stroke="#334155" stroke-width="1"/>

    <!-- Body / Uniform -->
    <rect x="50" y="70" width="60" height="70" rx="8" fill="#1e3a5f" stroke="#334155" stroke-width="1"/>
    <!-- Uniform Details -->
    <rect x="50" y="100" width="60" height="2" fill="#0f172a" opacity="0.5"/>
    <rect x="50" y="120" width="60" height="2" fill="#0f172a" opacity="0.5"/>
    <!-- Belt -->
    <rect x="48" y="125" width="64" height="8" rx="2" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <rect x="75" y="125" width="10" height="8" rx="1" fill="#fbbf24" opacity="0.8"/>

    <!-- Arms -->
    <!-- Left arm (down) -->
    <rect x="35" y="75" width="14" height="45" rx="6" fill="#1e3a5f" stroke="#334155" stroke-width="1" transform="rotate(15 42 75)"/>
    <!-- Right arm (throwing) -->
    <rect x="105" y="55" width="14" height="40" rx="6" fill="#1e3a5f" stroke="#334155" stroke-width="1" transform="rotate(-35 112 55)"/>

    <!-- Hands -->
    <circle cx="50" cy="118" r="8" fill="#fca5a5" stroke="#f87171" stroke-width="1"/>
    <circle cx="135" cy="35" r="8" fill="#fca5a5" stroke="#f87171" stroke-width="1"/>

    <!-- Head -->
    <circle cx="80" cy="50" r="28" fill="#fca5a5" stroke="#f87171" stroke-width="1"/>
    <!-- Hair -->
    <path d="M 52 45 Q 55 20 80 18 Q 105 20 108 45 Q 108 55 100 50 Q 80 45 60 50 Q 52 55 52 45" fill="#1e293b"/>
    <!-- Eyes -->
    <circle cx="72" cy="48" r="4" fill="#fff"/>
    <circle cx="72" cy="48" r="2" fill="#1e293b"/>
    <circle cx="88" cy="48" r="4" fill="#fff"/>
    <circle cx="88" cy="48" r="2" fill="#1e293b"/>
    <!-- Smile -->
    <path d="M 72 58 Q 80 64 88 58" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>

    <!-- Cap -->
    <path d="M 55 38 Q 80 15 105 38 L 108 42 Q 80 30 52 42 Z" fill="#1e3a5f" stroke="#334155" stroke-width="1"/>
    <rect x="75" y="22" width="10" height="8" rx="2" fill="#fbbf24" opacity="0.9"/>
    <!-- Cap Visor -->
    <path d="M 52 42 Q 80 55 108 42 L 112 45 Q 80 62 48 45 Z" fill="#1e3a5f" stroke="#334155" stroke-width="1"/>

    <!-- Package Being Thrown -->
    <g transform="translate(145, 5) rotate(25)">
      <rect x="0" y="0" width="44" height="36" rx="4" fill="#1e293b" stroke="#fbbf24" stroke-width="2" filter="url(#pkgGlow)"/>
      <!-- Package tape -->
      <rect x="10" y="12" width="24" height="4" rx="1" fill="#fbbf24" opacity="0.7"/>
      <rect x="18" y="8" width="8" height="14" rx="1" fill="#fbbf24" opacity="0.5"/>
      <!-- Code symbol on package -->
      <text x="22" y="28" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="700" opacity="0.8">&lt;/&gt;</text>
      <!-- Motion trail -->
      <path d="M -10 8 L -25 5 M -8 18 L -22 18 M -6 28 L -20 32" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    </g>
  </g>

  <!-- AutoShip Wordmark -->
  <g transform="translate(60, 80)">
    <text x="0" y="0" fill="#fff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" letter-spacing="-2">AutoShip</text>
    <!-- Underline accent -->
    <rect x="0" y="18" width="280" height="4" rx="2" fill="#fbbf24" filter="url(#softGlow)"/>
    <rect x="290" y="18" width="60" height="4" rx="2" fill="#f97316" opacity="0.7"/>
  </g>

  <!-- Tagline -->
  <g transform="translate(60, 130)">
    <text x="0" y="0" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" letter-spacing="0.5">Turn backlog into reviewed PRs.</text>
  </g>

  <!-- OpenCode Badge -->
  <g transform="translate(60, 180)">
    <!-- Badge Background -->
    <rect x="0" y="0" width="200" height="70" rx="10" fill="url(#badgeGrad)" stroke="#334155" stroke-width="1.5"/>
    <!-- Left accent bar -->
    <rect x="0" y="0" width="4" height="70" rx="2" fill="#fbbf24"/>
    <!-- Geometric Icon -->
    <g transform="translate(20, 18)">
      <polygon points="17,0 34,10 34,28 17,38 0,28 0,10" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linejoin="round"/>
      <polygon points="17,8 26,13 26,23 17,28 8,23 8,13" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="1"/>
      <circle cx="17" cy="18" r="4" fill="#fbbf24"/>
    </g>
    <!-- Text -->
    <text x="65" y="28" fill="#fff" font-family="system-ui, sans-serif" font-size="16" font-weight="700">OpenCode</text>
    <text x="65" y="50" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="14" font-weight="600">15 workers</text>
    <!-- Active dot -->
    <circle cx="180" cy="18" r="5" fill="#22c55e" filter="url(#softGlow)"/>
    <circle cx="180" cy="18" r="2" fill="#fff"/>
  </g>

  <!-- Hermes Badge -->
  <g transform="translate(280, 180)">
    <!-- Badge Background -->
    <rect x="0" y="0" width="200" height="70" rx="10" fill="url(#badgeGrad)" stroke="#334155" stroke-width="1.5"/>
    <!-- Left accent bar -->
    <rect x="0" y="0" width="4" height="70" rx="2" fill="#f97316"/>
    <!-- Winged Helmet Icon -->
    <g transform="translate(20, 14)">
      <!-- Helmet dome -->
      <path d="M 8 22 Q 8 8 20 8 Q 32 8 32 22" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
      <!-- Helmet base -->
      <path d="M 5 22 L 35 22 L 33 28 L 7 28 Z" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1.5"/>
      <!-- Wings -->
      <path d="M 8 14 Q -2 8 -2 2 Q 4 6 8 10" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
      <path d="M 32 14 Q 42 8 42 2 Q 36 6 32 10" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
      <!-- Wing details -->
      <line x1="2" y1="5" x2="6" y2="8" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="38" y1="5" x2="34" y2="8" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Text -->
    <text x="65" y="28" fill="#fff" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Hermes</text>
    <text x="65" y="50" fill="#f97316" font-family="system-ui, sans-serif" font-size="14" font-weight="600">3 workers</text>
    <!-- Active dot -->
    <circle cx="180" cy="18" r="5" fill="#22c55e" filter="url(#softGlow)"/>
    <circle cx="180" cy="18" r="2" fill="#fff"/>
  </g>

  <!-- Plus Sign Between Badges -->
  <g transform="translate(265, 215)">
    <rect x="0" y="-6" width="12" height="3" rx="1.5" fill="#475569"/>
    <rect x="4.5" y="-10" width="3" height="12" rx="1.5" fill="#475569"/>
  </g>

  <!-- GitHub Issue Icon (Left side) -->
  <g transform="translate(180, 290)">
    <circle cx="20" cy="20" r="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="18" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2"/>
    <text x="20" y="25" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="16" font-weight="700">!</text>
    <text x="20" y="55" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Issues</text>
  </g>

  <!-- GitHub PR Icon (Right side) -->
  <g transform="translate(980, 290)">
    <circle cx="20" cy="20" r="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <path d="M 12 10 L 12 30 M 12 20 L 28 20 M 28 14 L 28 26" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="12" cy="20" r="3" fill="#22c55e"/>
    <circle cx="28" cy="14" r="3" fill="#22c55e"/>
    <circle cx="28" cy="26" r="3" fill="#22c55e"/>
    <text x="20" y="55" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Pull Requests</text>
  </g>

  <!-- Connection lines from badges to flow -->
  <g stroke="#334155" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M 160 250 L 160 280 L 200 300"/>
    <path d="M 380 250 L 380 280 L 340 300"/>
  </g>

  <!-- Decorative corner elements -->
  <g opacity="0.3">
    <!-- Top left corner bracket -->
    <path d="M 20 20 L 20 50 M 20 20 L 50 20" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Top right corner bracket -->
    <path d="M 1180 20 L 1180 50 M 1180 20 L 1150 20" stroke="#f97316" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Bottom left corner bracket -->
    <path d="M 20 440 L 20 410 M 20 440 L 50 440" stroke="#f97316" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Bottom right corner bracket -->
    <path d="M 1180 440 L 1180 410 M 1180 440 L 1150 440" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Small floating packages (background depth) -->
  <g opacity="0.25">
    <rect x="150" y="80" width="20" height="16" rx="2" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
    <rect x="1030" y="120" width="18" height="14" rx="2" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
    <rect x="1100" y="200" width="22" height="18" rx="2" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
    <rect x="80" y="250" width="16" height="12" rx="2" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  </g>

  <!-- Speed lines near thrown package -->
  <g opacity="0.3" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round">
    <line x1="700" y1="160" x2="720" y2="155"/>
    <line x1="705" y1="170" x2="725" y2="168"/>
    <line x1="695" y1="180" x2="715" y2="182"/>
  </g>

  <!-- Version / Plugin label -->
  <g transform="translate(1140, 430)">
    <text x="0" y="0" text-anchor="end" fill="#475569" font-family="system-ui, sans-serif" font-size="11" font-weight="500" letter-spacing="1">GITHUB PLUGIN</text>
  </g>
</svg>
